<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>

    <script src="../index.js"></script>
    <script src="../src/loader.js"></script>

    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/chat.css">
    <link rel="icon" type="image/png" href="../images/logo_web.png">

</head>
<body>

<header id="site-header" xlu-include-file="../templates/header.html"></header>

<main>
    <div class="chat-container">

        <div class="chat-header">
            <a href="#" id="backButton" class="back-btn" title="Volver">←</a>
            <div class="chat-header-info">
                <img src="../images/juan_manuel.png" alt="Juan Manuel" class="chat-avatar">
                <div>
                    <h2>Juan Manuel González</h2>
                    <p class="online-status">🟢 En línea</p>
                </div>
            </div>
        </div>

        <div class="chat-messages">
            <div class="message profesor">
                <img src="../images/juan_manuel.png" alt="Juan Manuel" class="message-avatar">
                <div class="message-content">
                    <p class="teacher-message-intro">¡Hola! ¿En qué puedo ayudarte con Python?</p>
                    <span class="message-time">10:30</span>
                </div>
            </div>

            <div class="message alumno">
                <div class="message-content alumno">
                    <p class="student-message-intro">Hola, soy de ingeniería informática y tengo un proyecto con Django</p>
                    <span class="message-time">10:32</span>
                </div>
                <img src="../images/perfil.jpg" alt="Mi perfil" class="message-avatar alumno-avatar">
            </div>

            <div class="message profesor">
                <img src="../images/juan_manuel.png" alt="Juan Manuel" class="message-avatar">
                <div class="message-content">
                    <p class="teacher-message-followup">Cuéntame, ¿qué es lo que se te complica?</p>
                    <span class="message-time">10:33</span>
                </div>
            </div>

            <div class="message alumno">
                <div class="message-content alumno">
                    <p>Los modelos y las relaciones entre tablas</p>
                    <span class="message-time">10:35</span>
                </div>
                <img src="../images/perfil.jpg" alt="Mi perfil" class="message-avatar alumno-avatar">
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" placeholder="Escribe un mensaje..." class="chat-input">
            <button class="send-btn">Enviar</button>
        </div>

    </div>
</main>

<footer id="site-footer" xlu-include-file="../templates/footer.html"></footer>

<script>
    async function init() {
        await loadHTML('../templates/header.html', 'site-header');
        await loadHTML('../templates/footer.html', 'site-footer');
        loadData();
        setupBackButton();
    }

    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get("id"));

    document.addEventListener('DOMContentLoaded', init);

    function loadData() {
        fetch("../data/professors.json")
            .then(res => res.json())
            .then(data => {
                const prof = data.find(p => p.id === id);
                if (!prof) return;

                document.querySelector('.chat-header-info img').src = prof.image;
                document.querySelector('.chat-header-info img').alt = prof.name;
                document.querySelector('.chat-header h2').textContent = prof.name;

                localStorage.setItem('currentChatId', prof.id);
                localStorage.setItem('currentChatName', prof.name);

                const profesorImages = document.querySelectorAll('.message.profesor img');
                profesorImages.forEach(img => {
                    img.src = prof.image;
                    img.alt = prof.name;
                });

                const studentIntro = document.querySelector('.student-message-intro');
                if (studentIntro) {
                    studentIntro.textContent = `Hola ${prof.name}, soy de ingeniería informática y tengo un proyecto con Django`;
                }

                const teacherIntro = document.querySelector('.teacher-message-intro');
                if (teacherIntro) {
                    teacherIntro.textContent = `¡Hola! ¿En qué puedo ayudarte con ${prof.speciality}?`;
                }
            });
    }

    function setupBackButton() {
        const backBtn = document.getElementById('backButton');

        backBtn.addEventListener('click', function(e) {
            e.preventDefault();
            window.history.back();
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const auth = window.codify?.getAuth ? window.codify.getAuth() : { loggedIn: false };
        const usuarioLogueado = auth.loggedIn || false;

        if (!usuarioLogueado) {
            if (window.codify?.toast) {
                window.codify.toast("No tienes permiso para acceder al chat");
            }

            setTimeout(function() {
                window.location.href = "home-public.html";
            }, 500);
        }
    });

    document.querySelector('.send-btn')?.addEventListener('click', function(e) {
        const auth = window.codify?.getAuth ? window.codify.getAuth() : { loggedIn: false };
        const usuarioLogueado = auth.loggedIn || false;

        if (!usuarioLogueado) {
            e.preventDefault();
            window.location.href = "sign-in.html";
        }
    });
</script>

</body>
</html>
