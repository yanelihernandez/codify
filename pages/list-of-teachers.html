<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Python</title>
    <link rel="icon" type="image/png" href="../images/logo_web.png">
    <script src="../index.js"></script>
    <script src="../src/loader.js"></script>
    <script src="../src/utils.js"></script>
    <link rel="stylesheet" href="../styles/professors-programming-language.css">
    <link rel="stylesheet" href="../styles/professor-card.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/aside-nav.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/toast.css">
</head>
<body>

<header id="site-header" xlu-include-file="../templates/header.html"></header>

<aside id="aside-nav"></aside>

<main>

    <div class="introduction">
        <p class="introduction-title"></p>
        <p class="language-introduction"></p>
    </div>

    <section class="professors-list">
        <!-- Templates de tarjetas de profesor -->
    </section>

</main>

<footer id="site-footer" xlu-include-file="../templates/footer.html"></footer>

</body>

<script>
    document.addEventListener('DOMContentLoaded', init);

    // Función para mostrar toast usando el mismo estilo que window.codify.toast
    function showToast(message) {
        // Intentar usar window.codify.toast primero
        if (window.codify && typeof window.codify.toast === 'function') {
            window.codify.toast(message);
            return;
        }

        // Si no está disponible, crear toast manualmente con los mismos estilos
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        document.body.appendChild(toast);

        // Forzar reflow para que la animación funcione
        setTimeout(() => {
            toast.classList.add('show');
        }, 10);

        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => {
                toast.remove();
            }, 250);
        }, 2200);
    }

    async function init() {
        await loadHTML('../templates/header.html', 'site-header');
        await loadHTML('../templates/aside.html', 'aside-nav');
        setupAsideNavBar();
        await loadHTML('../templates/footer.html', 'site-footer');

        await loadHTML('../templates/professor-card.html');

        await loadLanguage();
        addProfessors();

        // Inicializar favoritos después de cargar las tarjetas
        setTimeout(() => {
            if (window.codify?.initCodifyUI) {
                window.codify.initCodifyUI();
            }
        }, 200);
    }

    const params = new URLSearchParams(window.location.search);
    const language_id = Number(params.get("language"));
    let page_language;

    async function loadLanguage() {
        const res = await fetch('../data/languages.json');
        const languages = await res.json();

        const language = languages.find(l => l.id === language_id);
        page_language = language.name;

        document.querySelector(".introduction-title").innerText = "Profesores de " + language.name;
        document.querySelector(".language-introduction").innerText = language.introduction;
    }

    function addProfessors() {
        fetch('../data/professors.json')
            .then(res => res.json())
            .then(professors => {

                const container = document.querySelector('.professors-list');
                const template = document.getElementById('professor-card-template');

                if (!template) return;

                container.innerHTML = '';

                professors
                    .filter(professor => professor.speciality === page_language)
                    .forEach(professor => {
                        const clone = template.content.cloneNode(true);

                        const img = clone.querySelector('img');
                        img.src = professor.image;
                        img.alt = professor.name;

                        const nameEl = clone.querySelector('.professor-name');
                        nameEl.textContent = professor.name;

                        const infoEl = clone.querySelector('.professor-info');
                        infoEl.textContent = professor.info;

                        const profileLink = clone.querySelector('.see-profile-btn');
                        profileLink.href = `../pages/teacher.html?id=${professor.id}`;

                        const favBtn = clone.querySelector('.fav-btn');
                        if (favBtn) {
                            favBtn.dataset.professorId = professor.id;

                            const auth = window.codify?.getAuth ? window.codify.getAuth() : { loggedIn: false };

                            if (!auth.loggedIn) {
                                favBtn.classList.add('guest-mode');
                                favBtn.textContent = '♡';
                            } else {
                                const isFav = window.codify?.isFavorite ? window.codify.isFavorite(professor.id) : false;
                                if (isFav) {
                                    favBtn.classList.add('liked');
                                    favBtn.textContent = '♥';
                                } else {
                                    favBtn.textContent = '♡';
                                }
                            }

                            // Evento click del corazón
                            favBtn.onclick = function(e) {
                                e.preventDefault();
                                e.stopPropagation();

                                const currentAuth = window.codify?.getAuth ? window.codify.getAuth() : { loggedIn: false };

                                // Si NO está logueado
                                if (!currentAuth.loggedIn) {
                                    // Mostrar toast usando nuestra función local
                                    showToast("Debes iniciar sesión para guardar favoritos");

                                    setTimeout(function() {
                                        sessionStorage.setItem('redirectAfterLogin', window.location.href);
                                        window.location.href = "sign-in.html";
                                    }, 800);
                                    return;
                                }

                                // Si está logueado, toggle favorito
                                const professorId = parseInt(this.dataset.professorId);
                                const currentlyLiked = this.classList.contains('liked');

                                if (currentlyLiked) {
                                    if (window.codify?.removeFavorite) window.codify.removeFavorite(professorId);
                                    this.classList.remove('liked');
                                    this.textContent = '♡';
                                    showToast("Eliminado de favoritos");
                                } else {
                                    if (window.codify?.addFavorite) window.codify.addFavorite(professorId);
                                    this.classList.add('liked');
                                    this.textContent = '♥';
                                    showToast("Añadido a favoritos");
                                }

                                window.dispatchEvent(new CustomEvent('favorites:updated'));
                            };
                        }

                        container.appendChild(clone);
                    });
            })
            .catch((err) => console.error(err));
    }
</script>

</html>
