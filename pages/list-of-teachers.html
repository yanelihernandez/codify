<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Python</title>
    <link rel="icon" type="image/png" href="../images/logo_web.png">
    <script src="../index.js"></script>
    <script src="../src/loader.js"></script>
    <link rel="stylesheet" href="../styles/professors-programming-language.css">
    <link rel="stylesheet" href="../styles/professor-card.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
</head>
<body>

<header id="site-header" xlu-include-file="../templates/header.html"></header>

<main>

    <div class="introduction">
        <p class="introduction-title"></p>
        <p class="language-introduction"></p>
    </div>

    <section class="professors-list">
        <!-- Templates de tarjetas de profesor -->
    </section>

</main>

<footer id="site-footer" xlu-include-file="../templates/footer.html"></footer>

</body>

<script>
    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        await loadHTML('../templates/header.html', 'site-header');
        await loadHTML('../templates/footer.html', 'site-footer');

        await loadHTML('../templates/professor-card.html');

        await loadLanguage();
        addProfessors();
    }

    const params = new URLSearchParams(window.location.search);
    const language_id = Number(params.get("language"));
    let page_language;

    async function loadLanguage() {
        const res = await fetch('../data/languages.json');
        const languages = await res.json();

        const language = languages.find(l => l.id === language_id);
        page_language = language.name;

        document.querySelector(".introduction-title").innerText = "Profesores de " + language.name;
        document.querySelector(".language-introduction").innerText = language.introduction;
    }

    function addProfessors() {
        fetch('../data/professors.json')
            .then(res => res.json())
            .then(professors => {
                const container = document.querySelector('.professors-list');
                const template = document.getElementById('professor-card-template');

                if (!template) return;

                container.innerHTML = '';

                professors
                    .filter(professor => professor.speciality === page_language)
                    .forEach(professor => {
                        const clone = template.content.cloneNode(true);

                        const img = clone.querySelector('img');
                        img.src = professor.image;
                        img.alt = professor.name;

                        const nameEl = clone.querySelector('.professor-name');
                        nameEl.textContent = professor.name;

                        const infoEl = clone.querySelector('.professor-info');
                        infoEl.textContent = professor.info;

                        const profileLink = clone.querySelector('.see-profile-btn');
                        profileLink.href = `../pages/teacher.html?id=${professor.id}`;

                        container.appendChild(clone);
                    });
            })
            .catch((err) => console.error(err));
    }
</script>

</html>
