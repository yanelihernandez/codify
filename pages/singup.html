<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sing Up</title>
    <script src="../index.js"></script>
    <link rel="stylesheet" href="../styles/singup.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">

</head>
<body>

<header class="site-header" xlu-include-file="../templates/header.html"></header>

<main>
    <div class="contenedor">
        <h1>Regístrate</h1>

        <a class="home-btn" href="index.html">
            <img src="../images/logo.jpg" alt="Logo">
        </a>

        <div class="formulario">
            <div class="nombre-apellidos">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre">

                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos">
            </div>

            <label for="fecha-nacimiento">Fecha de nacimiento</label>
            <input type="datetime-local" id="fecha-nacimiento">

            <label for="usuario">Nombre de usuario</label>
            <input type="text" id="usuario">

            <label for="contraseña">Contraseña</label>
            <input type="text" id="contraseña">

            <label for="rep-contraseña">Repetir Contraseña</label>
            <input type="text" id="rep-contraseña">
        </div>

        <div class="botones">
            <button>Aceptar</button>
            <a href="login.html">¿Ya tienes cuenta? - Inicia Sesión</a>
        </div>
    </div>
</main>

<footer class="site-footer" xlu-include-file="../templates/footer.html"></footer>

</body>

<script>
    xLuIncludeFile();
</script>

</html>
