<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Regístrate</title>
    <script src="../index.js"></script>
    <link rel="stylesheet" href="../styles/sign-up.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/toast.css">

</head>
<body>

<header class="site-header" xlu-include-file="../templates/header.html"></header>

<main>
    <div class="contenedor">
        <h1>Regístrate</h1>

        <a class="home-btn" href="home.html">
            <img src="../images/logo.png" alt="Logo">
        </a>

        <div class="formulario">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input class="formulario-input" type="text" id="nombre">
            </div>

            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input class="formulario-input" type="text" id="apellidos">
            </div>

            <div class="form-group">
                <label for="fecha-nacimiento">Fecha de nacimiento</label>
                <input class="formulario-input" type="date" id="fecha-nacimiento">
            </div>

            <div class="form-group">
                <label for="contraseña">Contraseña</label>
                <div class="field-wrapper">
                    <input class="formulario-input" type="password" id="contraseña">
                    <button type="button" class="toggle-btn">👁</button>
                </div>
                <p class="error-msg" id="passwordError">La contraseña debe tener al menos 6 caracteres</p>
            </div>

            <div class="form-group">
                <label for="rep-contraseña">Repetir Contraseña</label>
                <div class="field-wrapper">
                    <input class="formulario-input" type="password" id="rep-contraseña">
                    <button type="button" class="toggle-btn">👁</button>
                </div>
                <p class="error-msg" id="repeatError">Las contraseñas no coinciden</p>
            </div>

        </div>

        <div class="botones">
            <a href="sign-in.html">¿Ya tienes cuenta? - Inicia Sesión</a>
            <button id="btnSignup" type="button">Aceptar</button>
        </div>
    </div>
</main>

<footer class="site-footer" xlu-include-file="../templates/footer.html"></footer>

<script>
    xLuIncludeFile();

    function validatePasswords() {
        const password = document.getElementById('contraseña');
        const repeat = document.getElementById('rep-contraseña');
        const passwordError = document.getElementById('passwordError');
        const repeatError = document.getElementById('repeatError');

        passwordError.style.display = 'none';
        repeatError.style.display = 'none';

        password.closest('.field-wrapper')?.classList.remove('has-error');
        repeat.closest('.field-wrapper')?.classList.remove('has-error');
        
        if (password.value.length > 0 && password.value.length < 6) {
            passwordError.style.display = 'block';
            password.closest('.field-wrapper').classList.add('has-error');
        }
        
        if (repeat.value.length > 0 && password.value !== repeat.value) {
            repeatError.style.display = 'block';
            repeat.closest('.field-wrapper').classList.add('has-error');
        }
    }

    document.getElementById('contraseña')?.addEventListener('input', validatePasswords);
    document.getElementById('rep-contraseña')?.addEventListener('input', validatePasswords);

    document.getElementById("btnSignup")?.addEventListener("click", () => {
        const password = document.getElementById('contraseña')?.value;
        const repeat = document.getElementById('rep-contraseña')?.value;

        if (!password || password.length < 6) {
            window.codify?.toast?.("La contraseña debe tener al menos 6 caracteres");
            return;
        }

        if (password !== repeat) {
            window.codify?.toast?.("Las contraseñas no coinciden");
            return;
        }

        const name = document.getElementById("nombre")?.value?.trim() || "Usuario";
        window.codify?.setAuth?.({ loggedIn: true, username: name });
        window.codify?.toast?.("Registro completado");
        setTimeout(() => (window.location.href = "sign-in.html"), 450);
    });
</script>

</body>
</html>
