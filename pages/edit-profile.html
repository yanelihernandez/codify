<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Modificar perfil</title>

    <script src="../index.js"></script>
    <script src="../src/loader.js"></script>

    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/sign-up.css">
    <link rel="stylesheet" href="../styles/toast.css">
    <link rel="icon" type="image/png" href="../images/logo_web.png">
</head>

<body>

<header id="site-header" xlu-include-file="../templates/header.html"></header>

<main>
    <div class="contenedor">
        <h1>Modificar perfil</h1>

        <a class="home-btn" href="../pages/home.html">
            <img src="../images/logo_verde.png" alt="Logo" width="180" height="auto">
        </a>

        <div class="formulario">
            <div class="fila-doble">
                <div class="form-group mitad">
                    <label for="nombre">Nombre</label>
                    <input class="formulario-input" type="text" id="nombre" placeholder="Tu nombre">
                </div>

                <div class="form-group mitad">
                    <label for="apellidos">Apellidos</label>
                    <input class="formulario-input" type="text" id="apellidos" placeholder="Tus apellidos">
                </div>
            </div>

            <div class="form-group">
                <label for="fecha-nacimiento">Fecha de Nacimiento</label>
                <input class="formulario-input" type="text" id="fecha-nacimiento" placeholder="DD-MM-YYYY (ejemplo: 24-03-2000)">
                <p class="error-msg" id="fechaError" style="display: none;"></p>
                <div id="mensajeEdad" class="mensaje-edad"></div>
            </div>

            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input class="formulario-input" type="text" id="username" placeholder="Nombre de usuario">
            </div>

            <div class="form-group">
                <label for="contraseña">Nueva Contraseña</label>
                <div class="field-wrapper">
                    <input class="formulario-input" type="password" id="contraseña" placeholder="********">
                    <button type="button" class="toggle-btn" id="btnVer1">👁</button>
                </div>
                <p class="password-hint">Mínimo 8 caracteres - Déjalo en blanco para no cambiar</p>
                <p class="error-msg" id="passwordError">La contraseña debe tener al menos 8 caracteres</p>
            </div>

            <div class="form-group">
                <label for="rep-contraseña">Repetir Nueva Contraseña</label>
                <div class="field-wrapper">
                    <input class="formulario-input" type="password" id="rep-contraseña" placeholder="********">
                    <button type="button" class="toggle-btn" id="btnVer2">👁</button>
                </div>
                <p class="error-msg" id="repeatError">Las contraseñas no coinciden</p>
            </div>
        </div>

        <div class="botones">
            <button type="button" onclick="window.location.href='profile.html'">Cancelar</button>
            <button id="btnSave" type="button">
                <span id="btnText">Guardar cambios</span>
                <div id="btnSpinner" class="spinner"></div>
            </button>
        </div>

    </div>
</main>

<footer id="site-footer" xlu-include-file="../templates/footer.html"></footer>

<script>
    async function init() {
        await loadHTML('../templates/header.html', 'site-header');
        await loadHTML('../templates/footer.html', 'site-footer');
    }
    document.addEventListener('DOMContentLoaded', init);

    function comprobarEdad() {
        let inputFecha = document.getElementById('fecha-nacimiento');
        let fecha = inputFecha.value.trim();
        let mensaje = document.getElementById('mensajeEdad');
        let errorFecha = document.getElementById('fechaError');

        errorFecha.style.display = 'none';
        inputFecha.classList.remove('input-error');
        mensaje.innerHTML = "";
        mensaje.className = "mensaje-edad";

        if (fecha === "") return;

        let partes = fecha.split("-");

        if (partes.length != 3 || partes[2].length < 4) {
            errorFecha.innerText = "Formato incorrecto. Usa DD-MM-YYYY";
            errorFecha.style.display = 'block';
            inputFecha.classList.add('input-error');
            return;
        }

        let año = partes[2];
        let fechaNac = new Date(año + "-" + partes[1] + "-" + partes[0]);

        if (fechaNac == "Invalid Date" || isNaN(fechaNac.getTime())) {
            errorFecha.innerText = "Fecha no válida";
            errorFecha.style.display = 'block';
            inputFecha.classList.add('input-error');
            return;
        }

        let hoy = new Date();
        let edad = hoy.getFullYear() - fechaNac.getFullYear();

        if (hoy.getMonth() < fechaNac.getMonth() ||
            (hoy.getMonth() == fechaNac.getMonth() && hoy.getDate() < fechaNac.getDate())) {
            edad = edad - 1;
        }

        if (edad >= 18) {
            mensaje.innerHTML = "✓ Eres mayor de edad";
            mensaje.className = "mensaje-edad ok-mensaje";
        } else {
            mensaje.innerHTML = "✗ Eres menor de edad";
            mensaje.className = "mensaje-edad no-mensaje";
        }
    }

    function comprobarPass() {
        let pass1 = document.getElementById('contraseña');
        let pass2 = document.getElementById('rep-contraseña');
        let error1 = document.getElementById('passwordError');
        let error2 = document.getElementById('repeatError');

        error1.style.display = 'none';
        error2.style.display = 'none';

        if (pass1.closest('.field-wrapper')) {
            pass1.closest('.field-wrapper').classList.remove('has-error');
        }
        if (pass2.closest('.field-wrapper')) {
            pass2.closest('.field-wrapper').classList.remove('has-error');
        }

        if (pass1.value.length > 0) {
            if (pass1.value.length < 8) {
                error1.style.display = 'block';
                pass1.closest('.field-wrapper').classList.add('has-error');
            }

            if (pass2.value.length > 0 && pass1.value != pass2.value) {
                error2.style.display = 'block';
                pass2.closest('.field-wrapper').classList.add('has-error');
            }
        }
    }

    function loadProfile() {
        try {
            const raw = localStorage.getItem('codify_profile');
            return raw ? JSON.parse(raw) : null;
        } catch {
            return null;
        }
    }

    function saveProfile(profile) {
        localStorage.setItem('codify_profile', JSON.stringify(profile));
    }

    function loadUserData() {
        const auth = window.codify?.getAuth?.();
        if (!auth?.loggedIn) return null;

        const usersData = JSON.parse(localStorage.getItem('codify_users')) || { users: [] };
        return usersData.users.find(u => u.username === auth.username);
    }

    function updateUser(updatedUser) {
        const auth = window.codify?.getAuth?.();
        if (!auth?.loggedIn) return false;

        const usersData = JSON.parse(localStorage.getItem('codify_users')) || { users: [] };
        const userIndex = usersData.users.findIndex(u => u.username === auth.username);

        if (userIndex !== -1) {
            if (!updatedUser.password) {
                updatedUser.password = usersData.users[userIndex].password;
            }

            usersData.users[userIndex] = updatedUser;
            localStorage.setItem('codify_users', JSON.stringify(usersData));
            return true;
        }
        return false;
    }

    function showToast(message) {
        if (window.codify?.toast) {
            window.codify.toast(message);
        } else {
            alert(message);
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const auth = window.codify?.getAuth?.();

        if (!auth?.loggedIn) {
            window.location.href = 'sign-in.html';
            return;
        }

        const profile = loadProfile() || {};
        const userData = loadUserData();

        document.getElementById('nombre').value = userData?.nombre || profile.nombre || '';
        document.getElementById('apellidos').value = userData?.apellidos || profile.apellidos || '';
        document.getElementById('fecha-nacimiento').value = userData?.fechaNacimiento || profile.fechaNacimiento || '';
        document.getElementById('username').value = userData?.username || profile.username || auth.username || '';

        if ((userData?.fechaNacimiento || profile.fechaNacimiento)) {
            comprobarEdad();
        }
    });

    document.getElementById('fecha-nacimiento').addEventListener('input', comprobarEdad);
    document.getElementById('contraseña').addEventListener('input', comprobarPass);
    document.getElementById('rep-contraseña').addEventListener('input', comprobarPass);

    document.getElementById('btnVer1').addEventListener('click', function() {
        let input = document.getElementById('contraseña');
        if (input.type == 'password') {
            input.type = 'text';
            this.innerHTML = '🔒';
        } else {
            input.type = 'password';
            this.innerHTML = '👁';
        }
    });

    document.getElementById('btnVer2').addEventListener('click', function() {
        let input = document.getElementById('rep-contraseña');
        if (input.type == 'password') {
            input.type = 'text';
            this.innerHTML = '🔒';
        } else {
            input.type = 'password';
            this.innerHTML = '👁';
        }
    });

    document.getElementById('btnSave').addEventListener('click', function() {
        const perfilActual = loadProfile() || {};
        const auth = window.codify?.getAuth?.() || {};
        const userData = loadUserData();

        const nombre = document.getElementById('nombre').value.trim();
        const apellidos = document.getElementById('apellidos').value.trim();
        const fechaNacimiento = document.getElementById('fecha-nacimiento').value;
        const username = document.getElementById('username').value.trim();
        const pass1 = document.getElementById('contraseña').value;
        const pass2 = document.getElementById('rep-contraseña').value;

        if (nombre === '') {
            showToast("El nombre no puede estar vacío");
            document.getElementById('nombre').focus();
            return;
        }

        if (apellidos === '') {
            showToast("Los apellidos no pueden estar vacíos");
            document.getElementById('apellidos').focus();
            return;
        }

        if (fechaNacimiento === '') {
            showToast("La fecha de nacimiento no puede estar vacía");
            document.getElementById('fecha-nacimiento').focus();
            return;
        }

        if (username === '') {
            showToast("El nombre de usuario no puede estar vacío");
            document.getElementById('username').focus();
            return;
        }

        let partes = fechaNacimiento.split("-");
        if (partes.length != 3 || partes[2].length < 4) {
            showToast("Formato incorrecto. Usa DD-MM-YYYY");
            document.getElementById('fecha-nacimiento').classList.add('input-error');
            document.getElementById('fechaError').innerText = "Formato incorrecto. Usa DD-MM-YYYY";
            document.getElementById('fechaError').style.display = 'block';
            return;
        }

        let fechaNac = new Date(partes[2] + "-" + partes[1] + "-" + partes[0]);
        if (fechaNac == "Invalid Date" || isNaN(fechaNac.getTime())) {
            showToast("Fecha no válida");
            document.getElementById('fecha-nacimiento').classList.add('input-error');
            document.getElementById('fechaError').innerText = "Fecha no válida";
            document.getElementById('fechaError').style.display = 'block';
            return;
        }

        let hoy = new Date();
        let edad = hoy.getFullYear() - fechaNac.getFullYear();

        if (hoy.getMonth() < fechaNac.getMonth() ||
            (hoy.getMonth() == fechaNac.getMonth() && hoy.getDate() < fechaNac.getDate())) {
            edad = edad - 1;
        }

        if (edad < 18) {
            showToast("Debes ser mayor de 18 años");
            return;
        }

        if (pass1.length > 0 || pass2.length > 0) {
            if (pass1.length < 8) {
                showToast("La contraseña debe tener al menos 8 caracteres");
                return;
            }

            if (pass1 != pass2) {
                showToast("Las contraseñas no coinciden");
                return;
            }
        }

        const btn = document.getElementById('btnSave');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('btnSpinner');

        btn.disabled = true;
        btn.style.backgroundColor = "#ccc";
        btn.style.cursor = "not-allowed";
        btnText.style.display = "none";
        spinner.style.display = "block";

        const nuevoPerfil = {
            nombre: nombre,
            apellidos: apellidos,
            fullName: (nombre + ' ' + apellidos).trim(),
            fechaNacimiento: fechaNacimiento,
            username: username,
            masInfo: userData?.masInfo || perfilActual.masInfo || "Usuario registrado"
        };

        if (pass1.length > 0) {
            nuevoPerfil.password = pass1;
        }

        saveProfile({
            nombre: nuevoPerfil.nombre,
            apellidos: nuevoPerfil.apellidos,
            fullName: nuevoPerfil.fullName,
            fechaNacimiento: nuevoPerfil.fechaNacimiento,
            username: nuevoPerfil.username,
            masInfo: nuevoPerfil.masInfo
        });

        const actualizado = updateUser(nuevoPerfil);

        if (actualizado || !userData) {
            if (username !== auth.username) {
                window.codify?.setAuth?.({
                    ...auth,
                    loggedIn: true,
                    username: username,
                    fullName: nuevoPerfil.fullName
                });
            }

            let mensaje = "Cambios guardados correctamente";
            if (pass1.length > 0) {
                mensaje += " (contraseña actualizada)";
            }
            showToast(mensaje);

            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 500);
        } else {
            showToast("Error al guardar los cambios");
            btn.disabled = false;
            btn.style.backgroundColor = "";
            btn.style.cursor = "";
            btnText.style.display = "inline";
            spinner.style.display = "none";
        }
    });
</script>

</body>
</html>
