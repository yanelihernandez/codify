<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <link rel="stylesheet" href="../styles/profile.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">
    <link rel="stylesheet" href="../styles/chat-card.css">
</head>
<body>

<main>
    <div class="contenedor">
        <div class="izquierda">     <!-- info perfil -->
            <h1>Mi Perfil</h1>
            <img src="../images/perfil.jpg" alt="Logo">
            <p>Nombre usuario</p>
            <p>
                Nombre y Apellidos<br>
                Fecha de nacimiento<br>
                Mas info...
            </p>
            <div class="buttons">
                <a href="login.html">Modificar perfil</a>
                <a href="reservas.html">Ver Reservas</a>
            </div>

            <section class="calendar-section">
                <div class="calendar-placeholder">
                    Calendario
                </div>
                <div class="calendar-day-info">
                    Informacion del día X
                </div>
            </section>

        </div>      <!-- final info perfil -->

        <div class="derecha">   <!-- chats -->
            <h1>Mis chats</h1>

            <section class="chats-section">
                <!-- templates de chat -->
                <div class="chat-card">
                    <img src="../images/juan_manuel.png" alt="Juan Manuel">
                    <div class="chat-content">
                        <p class="professor-name">Juan Manuel</p>
                        <p>Ultimo mensaje...</p>
                    </div>
                    <button class="access">Acceder al chat</button>
                </div>

                <div class="chat-card">
                    <img src="../images/maria.png" alt="María">
                    <div class="chat-content">
                        <p class="professor-name">María</p>
                        <p>Ultimo mensaje...</p>
                    </div>
                    <button class="access">Acceder al chat</button>
                </div>

            </section>

        </div>      <!-- final chats -->
    </div>
</main>

</body>
