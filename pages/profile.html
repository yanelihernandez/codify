<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <script src="/index.js"></script>
    <link rel="stylesheet" href="/styles/profile.css">
    <link rel="stylesheet" href="/styles/header.css">
    <link rel="stylesheet" href="/styles/footer.css">
    <link rel="stylesheet" href="/styles/chat-card.css">
    <link rel="stylesheet" href="/styles/best-professor-card.css">
</head>
<body>

<header class="site-header" xlu-include-file="/templates/header.html"></header>

<main>
    <div class="contenedor">
        <div class="izquierda">     <!-- info perfil -->
            <h1>Mi Perfil</h1>
            <img src="/images/perfil.jpg" alt="Logo">
            <p>Nombre usuario</p>
            <p>
                Nombre y Apellidos<br>
                Fecha de nacimiento<br>
                Mas info...
            </p>
            <div class="buttons">
                <a href="sing-up.html">Modificar perfil</a>
                <a href="my-bookings.html">Ver Reservas</a>
            </div>

            <section class="calendar-section">
                <div class="calendar-placeholder">
                    Calendario
                </div>
                <div class="calendar-day-info">
                    Informacion del día X
                </div>
            </section>

        </div>      <!-- final info perfil -->

        <div class="derecha">   <!-- chats -->
            <h1>Mis chats</h1>

            <section class="chats-section">
                <!-- templates de chat -->
                <div class="chat-card" xlu-include-file="/templates/chat-card.html"></div>
                <div class="chat-card" xlu-include-file="/templates/chat-card.html"></div>
            </section>

        </div>      <!-- final chats -->
    </div>

    <div class="fav-professors">
        <div class="fav-professors-title">
            <h1>Mis professores favoritos</h1>
        </div>
        <div class="fav-professors-content">
            <div class="best-professor-card" xlu-include-file="../templates/best-professor-card.html"></div>
        </div>
    </div>

</main>

<footer class="site-footer" xlu-include-file="/templates/footer.html"></footer>



</body>

<script>
    xLuIncludeFile();
</script>

</html>
