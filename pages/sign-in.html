<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Log In</title>
    <script src="/index.js"></script>
    <link rel="stylesheet" href="../styles/sign-in.css">
    <link rel="stylesheet" href="../styles/header.css">
    <link rel="stylesheet" href="../styles/footer.css">

</head>
<body>

<header class="site-header" xlu-include-file="../templates/header.html"></header>

<main>

    <div class="contenedor">
        <h1>Inicia Sesión</h1>

        <a class="home-btn" href="home.html">
            <img src="../images/logo.png" alt="Logo">
        </a>

        <div class="formulario">
            <div class="form-group">
                <label for="usuario">Usuario</label>
                <input class="formulario-input" type="text" id="usuario">
            </div>

            <div class="form-group">
                <label for="contraseña">Contraseña</label>
                <div class="field-wrapper">
                    <input class="formulario-input" type="password" id="contraseña">
                    <button type="button" class="toggle-btn">👁</button>
                </div>
                <p class="error-msg">Contraseña incorrecta</p>
            </div>
        </div>

        <div class="botones">
            <a href="sing-up.html">¿No tienes cuenta? - Regístrate</a>
            <button>Aceptar</button>
        </div>
    </div>

</main>

<footer class="site-footer" xlu-include-file="../templates/footer.html"></footer>

</body>

<script>
    xLuIncludeFile();
</script>

</html>
