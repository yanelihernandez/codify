<main>
  <div class="header-bookings">
    <button class="back-btn" type="button" routerLink="/profile">←</button>
    <h1 class="page-title">Mis Reservas</h1>
  </div>

  @if (bookings().length === 0) {
    <div class="no-bookings">
      <p>No tienes reservas realizadas aún</p>
      <a [routerLink]="'/'" class="btn-explore">Explorar profesores</a>
    </div>
  } @else {
    <section class="reservation-list">
      @for (booking of bookings(); track booking.id) {
        <app-booking-card
          [booking]="booking"
          (cancel)="removeBookingFromView($event)">
        </app-booking-card>
      }
    </section>
  }
</main>
