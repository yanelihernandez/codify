@if(language()){
  <main>

    <div class="introduction">
      <p class="introduction-title">{{ language()?.name }}</p>
      <p class="language-introduction">{{ language()?.introduction }}</p>
    </div>

    <section class="professors-list">

      @for (professor of professors(); track professor.id) {
        <app-teacher
          [image_src]="professor.image"
          [name]="professor.name"
          [info]="professor.info"
          [id]="professor.id">
        </app-teacher>
      } @empty {
        <p>No hay profesores disponibles (El array está vacío).</p>
      }

    </section>

  </main>
} @else {
  <p>Lenguaje no cargado</p>
}
