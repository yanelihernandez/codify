@if (professor(); as prof) {
  <main class="chat-page">
    <section class="chat-shell">
      <div class="chat-header">
        <button class="back-btn" type="button" (click)="goBack()">←</button>

        <div class="chat-professor">
          <img [src]="prof.image" [alt]="prof.name" class="chat-avatar" />
          <div>
            <h1 class="chat-title">Chat con {{ prof.name }}</h1>
            <p class="chat-subtitle">Profesor disponible</p>
          </div>
        </div>
      </div>

      <div class="chat-messages">
        @for (message of messages(); track message.id) {
          <div
            class="message"
            [class.mine]="message.senderId === auth.uid"
            [class.theirs]="message.senderId !== auth.uid"
          >
            <p class="message-text">{{ message.text }}</p>
            <p class="message-time">{{ toDate(message.createdAt) }}</p>
          </div>
        }
      </div>

      <form class="chat-input-row" (ngSubmit)="sendMessage()">
        <input
          type="text"
          name="message"
          [(ngModel)]="newMessage"
          placeholder="Escribe un mensaje..."
          class="chat-input"
        />
        <button type="submit" class="send-btn">Enviar</button>
      </form>
    </section>
  </main>
} @else {
  <p class="loading-message">Cargando chat...</p>
}
