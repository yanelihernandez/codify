<header>
  <div class="header-left">
    <button class="menu-toggle" (click)="toggleMobileMenu()">☰</button>

    <a class="home-btn" id="homeLink" [routerLink]="''">
      <img src="https://res.cloudinary.com/dcqaw1j7r/image/upload/v1777657389/logo_a7axaq.png" alt="Logo Codify">
    </a>
  </div>

  <section>
    <nav>
      <ul class="nav-bar">
        @for (lang of languages(); track lang.id) {
          <li>
            <a [routerLink]="['/language-teachers', lang.slug]">
              {{ lang.name }}
            </a>
          </li>
        }
      </ul>
    </nav>
  </section>

  <div class="profile" id="profileDropdown" [class.guest-mode]="!authState().loggedIn">
    <a href="#" class="profile-link" (click)="goToProfile($event)">

      <img
        [src]="headerProfileImage()"
        alt="perfil"
        id="headerProfileImg"
      >

    </a>

    <span class="username" id="headerUsername">
      {{ displayName() }}
    </span>

    @if (authState().loggedIn) {
      <div class="dropdown-menu" id="dropdownMenu" [class.show-dropdown]="menuOpen()">
        <a href="#" id="profileLinkMenu" (click)="goToMyProfile($event)">Mi Perfil</a>
        <a href="#" id="logoutBtn" (click)="logout($event)">Cerrar Sesión</a>
      </div>
    }
  </div>
  @if (mobileMenuOpen()) {
    <div class="mobile-nav-overlay" (click)="toggleMobileMenu()">
      <nav class="mobile-nav" (click)="$event.stopPropagation()">
        <div class="mobile-nav-header">
          <h3>Idiomas</h3>
          <button class="close-menu" (click)="toggleMobileMenu()">✕</button>
        </div>
        <ul>
          @for (lang of languages(); track lang.id) {
            <li>
              <a [routerLink]="['/language-teachers', lang.slug]" (click)="toggleMobileMenu()">
                {{ lang.name }}
              </a>
            </li>
          }
        </ul>
      </nav>
    </div>
  }
</header>
