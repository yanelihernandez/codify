<header>
  <div class="header-left">
    <button class="menu-toggle">☰</button>

    <a class="home-btn" id="homeLink" [routerLink]="''">
      <img src="images/logo.png" alt="Logo">
    </a>
  </div>

  <section>
    <nav>
      <ul class="nav-bar">
        <li><a [routerLink]="['/language-teachers', 'python']">Python</a></li>
        <li><a [routerLink]="['/language-teachers', 'java']">Java</a></li>
        <li><a [routerLink]="['/language-teachers', 'c']">C</a></li>
        <li><a [routerLink]="['/language-teachers', 'assembly']">Assembly</a></li>
      </ul>
    </nav>
  </section>

  <div class="profile" id="profileDropdown" [class.guest-mode]="!authState().loggedIn">
    <a href="#" class="profile-link" (click)="goToProfile($event)">
      <img src="images/perfil.jpg" alt="perfil" id="headerProfileImg">
    </a>
    <span class="username" id="headerUsername">{{ displayName() }}</span>

    @if (authState().loggedIn) {
      <div class="dropdown-menu" id="dropdownMenu" [class.show-dropdown]="menuOpen()">
        <a href="#" id="profileLinkMenu" (click)="goToMyProfile($event)">Mi Perfil</a>
        <a href="#" id="logoutBtn" (click)="logout($event)">Cerrar Sesión</a>
      </div>
    }
  </div>
</header>
