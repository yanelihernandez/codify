<article class="best-professor-card">
  <div class="card-top">
    <p class="stars">★ {{ rating }}</p>

    <button
      class="fav-btn"
      [class.guest-mode]="!authState().loggedIn"
      [class.liked]="isFavorite()"
      [attr.aria-pressed]="isFavorite()"
      (click)="onFavoriteClick($event)"
    >
      {{ isFavorite() ? '♥' : '♡' }}
    </button>
  </div>

  <img [attr.alt]="image_alt" [attr.src]="image_src">

  <p class="professor-name">{{ name }}</p>
  <p class="professor-speciality">Especialidad: {{ speciality }}</p>

  <a [routerLink]="['/teacher-profile', id]" class="see-profile">Ver perfil</a>
</article>
