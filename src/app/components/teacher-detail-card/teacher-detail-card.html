<article class="professor-card">
  <img [attr.alt]="image_alt" [attr.src]="image_src">

  <div class="professor-content">
    <p class="professor-name">{{ name }}</p>
    <p class="professor-info">{{ info }}</p>
  </div>

  <div class="professor-card-buttons">
    <button
      class="fav-btn"
      [class.guest-mode]="!authState().loggedIn"
      [class.liked]="isFavorite()"
      [attr.aria-pressed]="isFavorite()"
      (click)="onFavoriteClick($event)"
    >
      {{ isFavorite() ? '♥' : '♡' }}
    </button>

    <a [routerLink]="['/teacher-profile', id]" class="see-profile-btn">
      Ver Perfil
    </a>
  </div>
</article>
