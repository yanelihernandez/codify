<section class="profesores-mejor-valorados">
  <h2>Profesores mejor valorados</h2>

  <div class="lista-profesores">
    @for (professor of professors(); track professor.id) {
      <app-teacher-compact-card
        [id]="professor.id"
        [image_src]="professor.image"
        [image_alt]="professor.name"
        [name]="professor.name"
        [speciality]="professor.speciality"
        [rating]="professor.rating">
      </app-teacher-compact-card>
    }
  </div>
</section>
